<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Farm Mutton</title>
  <script>
    // Redirect /slug/ to /slug (remove trailing slash)
    var path = window.location.pathname;
    if (path.endsWith('/') && path.length > 1) {
      var newPath = path.slice(0, -1);
      window.location.replace(newPath + window.location.search + window.location.hash);
    }
  </script>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; padding: 60px 20px; background: #fff; color: #333; }
    h1 { font-size: 48px; color: #C41E3A; margin-bottom: 10px; }
    p { font-size: 18px; margin-bottom: 30px; }
    a { display: inline-block; background: #C41E3A; color: #fff; padding: 12px 28px; border-radius: 6px; text-decoration: none; font-weight: bold; }
    a:hover { background: #A01628; }
  </style>
</head>
<body>
  <h1>404</h1>
  <p>Oops! The page you're looking for doesn't exist.</p>
  <a href="/">Go Back Home</a>
</body>
</html>
